<!DOCTYPE html>
<html>
<head>
    <title>Latest Student Info System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f9;
            margin-top: 80px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005bb5;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Latest Student System</h2>

    <button onclick="getStudent()">Get Latest Student</button>

    <div id="result"></div>
</div>

<script>
async function getStudent() {
    const apiUrl = "https://6gfx5xqbgi.execute-api.ap-south-1.amazonaws.com/latest-student";

    try {
        const response = await fetch(apiUrl);
        const data = await response.json();

        const body = JSON.parse(data.body);

        document.getElementById("result").innerHTML = `
            <p><b>Name:</b> ${body.student.Name}</p>
            <p><b>Department:</b> ${body.student.Department}</p>
            <p><b>Message:</b> ${body.message}</p>
            <p><b>Audio File:</b> ${body.audio_file}</p>
        `;

    } catch (error) {
        document.getElementById("result").innerHTML =
            "Error fetching data";
    }
}
</script>

</body>
</html>
