<!DOCTYPE html>
<html>
<head>
    <title>Latest Student Info System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f9;
            margin-top: 80px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 420px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005bb5;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Latest Student System</h2>

    <button onclick="getStudent()">Get Latest Student</button>

    <div id="result"></div>
</div>

<script>
async function getStudent() {

    const apiUrl = "https://6gfx5xqbgi.execute-api.ap-south-1.amazonaws.com/latest-student";

    try {
        const response = await fetch(apiUrl);
        const data = await response.json();

        // Safe parsing (handles Lambda + API Gateway both cases)
        const body = typeof data.body === "string"
            ? JSON.parse(data.body)
            : data;

        const student = body.student;

        document.getElementById("result").innerHTML = `
            <h3>🎓 Latest Student Details</h3>

            <p><b>Name:</b> ${student.Name}</p>
            <p><b>Department:</b> ${student.Department}</p>
            <p><b>Student ID:</b> ${student.StudentID}</p>

            <p><b>Message:</b> ${body.message}</p>

            <p><b>Audio File:</b></p>
            <audio controls>
                <source src="https://student-audio-files-sahil-latets.s3.amazonaws.com/${body.audio_file}" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        `;

    } catch (error) {
        console.log(error);
        document.getElementById("result").innerHTML =
            "❌ Error fetching data from server";
    }
}
</script>

</body>
</html>
